services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB:       restaurant_ops
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d restaurant_ops"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://copilot:copilot@db:5432/restaurant_ops
    env_file:
      - path: .env
        required: false   # optional — add ANTHROPIC_API_KEY here to enable NL-ops
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
